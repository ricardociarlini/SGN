<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1067" role="img"
     aria-label="Ilustração de uma ilha de edição: editor de costas diante de dois monitores com linha do tempo de vídeo">
  <defs>
    <linearGradient id="sala" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#15181d"/>
      <stop offset="1" stop-color="#0b0c0e"/>
    </linearGradient>
    <radialGradient id="luz" cx="50%" cy="38%" r="55%">
      <stop offset="0" stop-color="#c9a227" stop-opacity=".22"/>
      <stop offset="1" stop-color="#c9a227" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="luzfria" cx="18%" cy="30%" r="45%">
      <stop offset="0" stop-color="#466ea0" stop-opacity=".28"/>
      <stop offset="1" stop-color="#466ea0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tela" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#243040"/>
      <stop offset="1" stop-color="#121820"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1067" fill="url(#sala)"/>
  <rect width="1600" height="1067" fill="url(#luzfria)"/>
  <rect width="1600" height="1067" fill="url(#luz)"/>

  <!-- painel acústico ao fundo -->
  <g opacity=".16" fill="none" stroke="#f2f0ec" stroke-width="2">
    <path d="M120 90h1360v520H120z"/>
    <path d="M290 90v520M460 90v520M630 90v520M800 90v520M970 90v520M1140 90v520M1310 90v520"/>
  </g>

  <!-- monitor esquerdo (preview) -->
  <g>
    <rect x="300" y="250" width="440" height="270" rx="10" fill="url(#tela)" stroke="#f2f0ec" stroke-opacity=".18"/>
    <rect x="322" y="272" width="396" height="200" rx="4" fill="#0d1116"/>
    <path d="M322 420l90-70 80 58 70-52 156 116H322z" fill="#466ea0" fill-opacity=".38"/>
    <circle cx="640" cy="316" r="24" fill="#c9a227" fill-opacity=".55"/>
    <rect x="322" y="484" width="396" height="8" rx="4" fill="#f2f0ec" fill-opacity=".12"/>
    <rect x="322" y="484" width="150" height="8" rx="4" fill="#c9a227" fill-opacity=".8"/>
    <rect x="486" y="520" width="68" height="46" fill="#f2f0ec" fill-opacity=".08"/>
    <rect x="430" y="566" width="180" height="12" rx="6" fill="#f2f0ec" fill-opacity=".1"/>
  </g>

  <!-- monitor direito (timeline) -->
  <g>
    <rect x="820" y="230" width="480" height="290" rx="10" fill="url(#tela)" stroke="#f2f0ec" stroke-opacity=".18"/>
    <rect x="842" y="252" width="436" height="110" rx="4" fill="#0d1116"/>
    <g fill="#466ea0" fill-opacity=".45">
      <rect x="856" y="266" width="120" height="26" rx="3"/>
      <rect x="984" y="266" width="180" height="26" rx="3"/>
      <rect x="1172" y="266" width="92" height="26" rx="3"/>
    </g>
    <g fill="#c9a227" fill-opacity=".55">
      <rect x="856" y="300" width="200" height="20" rx="3"/>
      <rect x="1064" y="300" width="140" height="20" rx="3"/>
    </g>
    <!-- forma de onda de áudio -->
    <g stroke="#f2f0ec" stroke-opacity=".38" stroke-width="3" stroke-linecap="round">
      <path d="M858 344v-16M872 348v-24M886 342v-12M900 350v-28M914 344v-16M928 352v-32M942 340v-8
               M956 348v-24M970 344v-16M984 352v-32M998 342v-12M1012 350v-28M1026 344v-16
               M1040 348v-24M1054 340v-8M1068 350v-28M1082 344v-16M1096 348v-24M1110 342v-12
               M1124 350v-28M1138 344v-16M1152 348v-24M1166 340v-8M1180 350v-28M1194 344v-16
               M1208 348v-24M1222 342v-12M1236 350v-28M1250 344v-16M1264 348v-24"/>
    </g>
    <line x1="1010" y1="252" x2="1010" y2="362" stroke="#c9a227" stroke-width="3"/>
    <rect x="842" y="384" width="436" height="112" rx="4" fill="#0d1116"/>
    <g fill="#f2f0ec" fill-opacity=".1">
      <rect x="856" y="398" width="130" height="84" rx="3"/>
      <rect x="998" y="398" width="130" height="84" rx="3"/>
      <rect x="1140" y="398" width="124" height="84" rx="3"/>
    </g>
    <rect x="1010" y="520" width="100" height="46" fill="#f2f0ec" fill-opacity=".08"/>
    <rect x="960" y="566" width="200" height="12" rx="6" fill="#f2f0ec" fill-opacity=".1"/>
  </g>

  <!-- bancada -->
  <rect x="120" y="590" width="1360" height="20" rx="6" fill="#f2f0ec" fill-opacity=".14"/>
  <rect x="120" y="610" width="1360" height="14" fill="#000" fill-opacity=".35"/>

  <!-- teclado e mesa de corte -->
  <g fill="#f2f0ec" fill-opacity=".12">
    <rect x="620" y="640" width="330" height="62" rx="8"/>
    <rect x="990" y="644" width="150" height="56" rx="8"/>
  </g>
  <g fill="#c9a227" fill-opacity=".7">
    <circle cx="1030" cy="672" r="10"/>
    <circle cx="1065" cy="672" r="10"/>
    <circle cx="1100" cy="672" r="10"/>
  </g>

  <!-- editor de costas -->
  <g fill="#05070a">
    <path d="M700 1067c0-150 60-250 180-250s180 100 180 250z"/>
    <circle cx="880" cy="762" r="66"/>
  </g>
  <g fill="#c9a227" fill-opacity=".25">
    <path d="M814 872c14-40 36-58 66-58s52 18 66 58c-40-18-92-18-132 0z"/>
  </g>

  <!-- grão de película -->
  <g opacity=".28">
    <rect width="1600" height="1067" fill="none"/>
    <g fill="#ffffff" fill-opacity=".025">
      <rect y="0"    width="1600" height="1"/><rect y="3"    width="1600" height="1"/>
      <rect y="6"    width="1600" height="1"/><rect y="9"    width="1600" height="1"/>
    </g>
  </g>
</svg>
